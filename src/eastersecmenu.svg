<svg xmlns="http://www.w3.org/2000/svg" width="910" height="500" viewBox="0 -5 100 110">

  <defs>
    <pattern id="pattern" x="0" y="150" width="50" height="1000" patternTransform="scale(0.2) rotate(-30, 25, 250)"
      patternUnits="userSpaceOnUse">
      <!-- Calcul dynamique du rayon en fonction de la position y -->
      <circle cx="25" cy="25" r="1" fill="#edeef0" />
      <circle cx="25" cy="75" r="5" fill="#edeef0" />
      <circle cx="25" cy="125" r="10" fill="#edeef0" />
      <circle cx="25" cy="175" r="15" fill="#edeef0" />
      <circle cx="25" cy="225" r="20" fill="#edeef0" />
      <circle cx="25" cy="275" r="25" fill="#edeef0" />
      <circle cx="25" cy="325" r="30" fill="#edeef0" />
      <circle cx="25" cy="375" r="35" fill="#edeef0" />
      <circle cx="25" cy="425" r="40" fill="#edeef0" />
      <circle cx="25" cy="475" r="45" fill="#edeef0" />
      <circle cx="25" cy="525" r="50" fill="#edeef0" />
      <circle cx="25" cy="475" r="55" fill="#edeef0" />
      <circle cx="25" cy="475" r="60" fill="#edeef0" />
      <circle cx="25" cy="475" r="60" fill="#edeef0" />
    </pattern>
  </defs>

  <!-- Utilisation du motif comme fond -->
  <g>
  <rect width="900" height="500" fill="url(#pattern)" x="-35"  /></g>

</svg>
